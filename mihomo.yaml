mixed-port: 7890
external-controller: 0.0.0.0:9090
external-ui: ui
unified-delay: true
tcp-concurrent: true
hosts:
  time.android.com: 203.107.6.88
proxy-groups:
  - name: DEFAULT
    type: select
    proxies:
      - DIRECT
  - name: FORCE
    type: select
    proxies:
      - DEFAULT
      - DIRECT
  - name: GAME
    type: select
    proxies:
      - DEFAULT
      - DIRECT
  - name: STREAM
    type: select
    proxies:
      - DEFAULT
      - DIRECT
  - name: US
    type: select
    proxies:
      - DEFAULT
      - DIRECT
rule-providers:
  ads:
    type: http
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/category-ads-all.mrs
    interval: 86400
    behavior: domain
    format: mrs
  ai:
    type: http
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/category-ai-!cn.mrs
    interval: 86400
    behavior: domain
    format: mrs
  blizzard:
    type: http
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/blizzard.mrs
    interval: 86400
    behavior: domain
    format: mrs
  cn:
    type: http
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/cn.mrs
    interval: 86400
    behavior: domain
    format: mrs
  cnip:
    type: http
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/cn.mrs
    interval: 86400
    behavior: ipcidr
    format: mrs
  direct:
    type: http
    url: https://raw.githubusercontent.com/yahngming/rules/master/direct.list
    interval: 86400
    behavior: classical
    format: text
  emby:
    type: http
    url: https://raw.githubusercontent.com/yahngming/rules/master/emby.list
    interval: 86400
    behavior: classical
    format: text
  force:
    type: http
    url: https://raw.githubusercontent.com/yahngming/rules/master/force.list
    interval: 86400
    behavior: classical
    format: text
  game:
    type: http
    url: https://raw.githubusercontent.com/yahngming/rules/master/game.list
    interval: 86400
    behavior: classical
    format: text
  github:
    type: http
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/github.mrs
    interval: 86400
    behavior: domain
    format: mrs
  google:
    type: http
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/google.mrs
    interval: 86400
    behavior: domain
    format: mrs
  netflix:
    type: http
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/netflix.mrs
    interval: 86400
    behavior: domain
    format: mrs
  private:
    type: http
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/private.mrs
    interval: 86400
    behavior: ipcidr
    format: mrs
  reject:
    type: http
    url: https://raw.githubusercontent.com/yahngming/rules/master/reject.list
    interval: 86400
    behavior: classical
    format: text
  steam:
    type: http
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/steam.mrs
    interval: 86400
    behavior: domain
    format: mrs
  x:
    type: http
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/x.mrs
    interval: 86400
    behavior: domain
    format: mrs
rules:
  - RULE-SET,private,DIRECT,no-resolve
  - RULE-SET,direct,DIRECT
  - RULE-SET,force,FORCE
  - RULE-SET,ads,REJECT
  - RULE-SET,reject,REJECT
  - RULE-SET,blizzard,GAME
  - RULE-SET,game,GAME
  - RULE-SET,steam,GAME
  - RULE-SET,emby,STREAM
  - RULE-SET,netflix,STREAM
  - RULE-SET,ai,US
  - RULE-SET,github,US
  - RULE-SET,google,US
  - RULE-SET,x,US
  - RULE-SET,cn,DIRECT
  - RULE-SET,cnip,DIRECT,no-resolve
  - MATCH,DEFAULT
