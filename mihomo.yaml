    behavior: domain
    format: mrs
  cnip:
    type: http
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/cn.mrs
    interval: 86400
    behavior: ipcidr
    format: mrs
  direct:
    type: http
    url: https://raw.githubusercontent.com/yahngming/rules/master/direct.list
    interval: 86400
    behavior: classical
    format: text
  emby:
    type: http
    url: https://raw.githubusercontent.com/yahngming/rules/master/emby.list
    interval: 86400
    behavior: classical
    format: text
  force:
    type: http
    url: https://raw.githubusercontent.com/yahngming/rules/master/force.list
    interval: 86400
    behavior: classical
