port: 7890
mode: rule
log-level: warning
unified-delay: true
tcp-concurrent: true
dns:
  enable: true
  ipv6: false
  default-nameserver:
    - 114.114.114.114
    - 223.5.5.5
    - 8.8.8.8
    - 1.1.1.1
  nameserver:
    - 119.29.29.29
    - 223.5.5.5
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.direct"
    - "*.example"
    - "*.home.arpa"
    - "*.invalid"
    - "*.lan"
    - "*.local"
    - "*.localdomain"
    - "*.localhost"
    - "*.test"
    - "*.ntp.*"
    - "*.time.*"
    - "ntp.*"
    - "stun.*"
    - "time.*"
hosts:
  time.android.com: 203.107.6.88
sniffer:
  enable: true
  sniff:
    HTTP:
      ports:
        - 80
        - 8080-8880
    QUIC:
      ports:
        - 443
        - 8443
    TLS:
      ports:
        - 443
        - 8443
proxy-groups:
  - name: DEFAULT
    type: select
    proxies:
      - DIRECT
    include-all: true
  - name: FORCE
    type: select
    proxies:
      - DEFAULT
      - DIRECT
    include-all: true
    filter: 自建
  - name: GAME
    type: select
    proxies:
      - DEFAULT
      - DIRECT
    include-all: true
  - name: STREAM
    type: select
    proxies:
      - DEFAULT
      - DIRECT
    include-all: true
    filter: 自建|实验|日用|0\.
  - name: US
    type: select
    proxies:
      - DEFAULT
      - DIRECT
    include-all: true
    filter: 🇺🇸
rule-providers:
  ads:
    type: http
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/category-ads-all.mrs
    interval: 86400
    behavior: domain
    format: mrs
  ai:
    type: http
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/category-ai-!cn.mrs
    interval: 86400
    behavior: domain
    format: mrs
  blizzard:
    type: http
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/blizzard.mrs
    interval: 86400
    behavior: domain
    format: mrs
  cn:
    type: http
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/cn.mrs
