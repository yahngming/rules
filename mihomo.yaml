proxy-groups:
  - name: FORCE
    type: select
    include-all: true
    filter: 自建
    proxies:
      - DIRECT
      - GLOBAL
  - name: GAME
    type: select
    include-all: true
    proxies:
      - DIRECT
      - GLOBAL
  - name: STREAM
    type: select
    include-all: true
    filter: 自建|实验|日用|0\.
    proxies:
      - DIRECT
      - GLOBAL
  - name: US
    type: select
    include-all: true
    filter: 🇺🇸
    proxies:
      - DIRECT
      - GLOBAL

