log-level: warning
mixed-port: 7890
external-controller: 0.0.0.0:9090
external-ui: ui
hosts:
  time.android.com: 203.107.6.88
profile:
  store-selected: true
sniffer:
  enable: true
  sniff:
    HTTP:
      ports:
        - 80
        - 8080-8880
    TLS:
      ports:
        - 443
        - 8443
tun:
  enable: true
  stack: mixed
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true
  dns-hijack:
    - any:53
    - tcp://any:53
dns:
  enable: true
  prefer-h3: false
  respect-rules: true
  enhanced-mode: redir-host
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://cloudflare-dns.com/dns-query
    - https://dns.google/dns-query
  nameserver-policy:
    rule-set:cn:
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
proxy-groups:
  - name: DEFAULT
    type: select
    proxies:
      - DIRECT
    include-all: true
  - name: FORCE
    type: select
    proxies:
      - DEFAULT
      - DIRECT
    include-all: true
    filter: 自建
  - name: GAME
    type: select
    proxies:
      - DEFAULT
      - DIRECT
    include-all: true
  - name: STREAM
    type: select
    proxies:
      - DEFAULT
      - DIRECT
    include-all: true
    filter: 自建|实验|日用|0\.
  - name: US
    type: select
    proxies:
      - DEFAULT
      - DIRECT
    include-all: true
    filter: 🇺🇸
rule-providers:
  ads:
    type: http
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/category-ads-all.mrs
    interval: 86400
    behavior: domain
    format: mrs
  ai:
    type: http
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/category-ai-!cn.mrs
    interval: 86400
    behavior: domain
    format: mrs
  blizzard:
    type: http
    url: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/blizzard.mrs
