  - RULE-SET,force,FORCE
  - RULE-SET,ads,REJECT
  - RULE-SET,reject,REJECT
  - RULE-SET,cn,DIRECT
  - RULE-SET,cnip,DIRECT
  - RULE-SET,direct,DIRECT
  - RULE-SET,private,DIRECT
  - RULE-SET,blizzard,GAME
  - RULE-SET,game,GAME
  - RULE-SET,steam,GAME
  - RULE-SET,emby,STREAM
  - RULE-SET,netflix,STREAM
  - RULE-SET,ai,US
  - RULE-SET,github,US
  - RULE-SET,google,US
  - RULE-SET,x,US
  - RULE-SET,youtube,US
